<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Party Portal">
  <defs>
    <linearGradient id="pp-ring" x1="6" y1="10" x2="58" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF3D90"/>
      <stop offset="0.5" stop-color="#BB4FFF"/>
      <stop offset="1" stop-color="#00E5FF"/>
    </linearGradient>
    <linearGradient id="pp-tri" x1="26" y1="22" x2="42" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFE7F4"/>
    </linearGradient>
    <radialGradient id="pp-core" cx="32" cy="32" r="22" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2A0030"/>
      <stop offset="1" stop-color="#07000F"/>
    </radialGradient>
  </defs>

  <!-- tile -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#07000F"/>

  <!-- portal core -->
  <circle cx="32" cy="32" r="21" fill="url(#pp-core)"/>

  <!-- portal ring -->
  <circle cx="32" cy="32" r="21" fill="none" stroke="url(#pp-ring)" stroke-width="6.5"/>
  <!-- inner accent ring -->
  <circle cx="32" cy="32" r="13.5" fill="none" stroke="url(#pp-ring)" stroke-width="1.6" opacity="0.55"/>

  <!-- live play triangle -->
  <path d="M27 23.5 L44 32 L27 40.5 Z" fill="url(#pp-tri)"/>

  <!-- sparkles -->
  <circle cx="50.5" cy="14" r="2.4" fill="#00E5FF"/>
  <circle cx="13.5" cy="49" r="1.7" fill="#FF3D90"/>
</svg>
